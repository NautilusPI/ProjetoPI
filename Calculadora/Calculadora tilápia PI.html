<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora financeira Nautilus</title>
</head>
<body>
    <div>
        <h1>
            Calculadora financeira Nautilus
        </h1>
    </div>
    <div class="" style="display: flex; flex-direction: column; gap: 10px;" >
        <h3>Insira as informações referente as depesas (mensais)</h3>
        <div>
            <p>Despesas gerais (luz,água,salarios etc.)</p>
            <input type="number" id="despesas_input">
        </div>
        <div>
            <p>Kilos de ração por mês</p>
            <input type="number" id="racao_mes_input">
        </div>
        <div>
            <p>Preço do kilo da ração</p>
            <input type="number" id="preco_racao_input">
        </div>
    </div>
</body>
</html>
