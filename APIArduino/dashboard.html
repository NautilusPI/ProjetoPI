    <link rel="stylesheet" href="dashTanque.css">
</head>

<body>


    <div class="navbar">

                <img src="../public/assets/Dashboard/logo.png" alt="">
            </div>
            <a class="link" href="inicio">Inicio</a>
            <a class="link" href="simulador">Simulador</a>
        </div>
        <div class="forms">
            <button class="vazado"><a href="../login.html">Entre</a></button>
            <button class="preenchido"><a href="../cadastro.html">Cadastre-se</a> </button>
        </div>
    </div>
    <div class="container-externo">
        <div class="container">
            <div class="topo">
                <div class="topoEsquerda">
                    <span>Dashboard</span>
                    <select name="" id="">
                        <option value="">Tanque 1</option>
                        <option value="">Visão Geral</option>
                        <option value="">Tanque 1</option>
                        <option value="">Tanque 2</option>
                        <option value="">Tanque 3</option>
                        <option value="">Tanque 4</option>
                        <option value="">Tanque 5</option>
                        <option value="">Tanque 6</option>
                    </select>
                </div>

            </div>
            <div class="kpis">
                <div class="card">
                    <div class="topoCard">
                        <span>Temperatura atual</span>
                    </div>
                    <div class="numeroCard" >
                        <span id="cardTemperatura">0.0 ºC</span>
                    </div>
                   
                </div>
                <div class="card">
                    <div class="topoCard">
                        <span>Momentos de risco (Último 7 días)</span>


                    </div>

                    </div>
                </div>

                <div class="card">
                    <div class="topoCard">
                        <span>Status do tanque</span>

                    </div>
                    <div class="numeroCard">
                        <span id="statusCard">Seguro</span>
                    </div>

                </div>
                <div class="card">
                    <div class="topoCard">
                        <span>Ultimo alerta </span>

                    </div>
                    <div class="numeroCard">
                        <span>5h atrás</span>
                    </div>
                </div>
            </div>
            <div class="graficoEkpis">
                <div class="graficoLinhaContainer">
                    <div class="topo">
                        <span>Histórico de temperatura </span>
                        <select name="" id="">
                            <option value="">Tanque 1</option>
                            <option value="">Tanque 1</option>
                            <option value="">Tanque 2</option>
                            <option value="">Tanque 3</option>
                            <option value="">Tanque 4</option>
                            <option value="">Tanque 5</option>
                            <option value="">Tanque 6</option>
                            <option value="">Visão Geral</option>
                        </select>
                    </div>
                    <div class="grafico">
                        <canvas id="sensorAnalogico"></canvas>
                    </div>
                </div>
                <div class="kpisSecundarias">
                    <div class="card">
                        <div class="topoCard">
                            <span>Status do sensor</span>
                        </div>
                        <div class="numeroCard">
                            <span>Estável</span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="topoCard">
                            <span>Modelo do sensor</span>
                        </div>
                        <div class="numeroCard">
                            <span>LM35</span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="topoCard">
                            <span>Instalação</span>
                        </div>
                        <div class="numeroCard">
                            <span>22/04/2026</span>
                        </div>
                    </div>
                    <div class="card">
                        <div class="topoCard">
                            <span>Capacidade do tanque</span>
                        </div>
                        <div class="numeroCard">
                            <span>15.000 Litros</span>
                        </div>
                    </div>
                </div>  
            </div>
        </div>
    </div>
</body>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <script>
        var labelsHorario = []
        var maximo = []
        var minimo = []
        var amarelo1 = []
        var amarelo2 = []
        var sensorAnalogico = new Chart(document.getElementById('sensorAnalogico').getContext('2d'), {
            type: 'line',
            data: {
                datasets: [{
                    label: 'Temperatura',

                    borderWidth: 1,
                    tension: 0.4,
                    fill: true,
                    pointRadius: 2,
                    borderColor: '#4DA3B8',
                    backgroundColor: 'rgba(77, 163, 184, 0.2)'
                },
                {
                    type: 'line',
                    data: maximo,
                    borderColor: 'rgba(231, 76, 60, 0.3)',
                    borderWidth: 2,
                    borderDash: [6, 6],
                    pointRadius: 0
                },

                {
                    type: 'line',
                    data: amarelo2,
                    borderColor: 'rgba(243, 156, 18, 0.3)',
                    borderWidth: 2,
                    borderDash: [6, 6],
                    pointRadius: 0
                },

                {
                    type: 'line',
                    data: amarelo1,
                    borderColor: 'rgba(243, 156, 18, 0.3)',
                    borderWidth: 2,
                    borderDash: [6, 6],
                    pointRadius: 0
                },

                {
                    type: 'line',
                    data: minimo,
                    borderColor: 'rgba(231, 76, 60, 0.3)',
                    borderWidth: 2,
                    borderDash: [6, 6],
                    pointRadius: 0
                }

                ]
            },
            options: {
                animation: false,
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    x: {
                        grid: {
                            display: false // remove as linhas de fundo
                        },
                        border: {
                            display: false // remove a linha do eixo (ESSA AQUI)
                        },
                    },
                    y: {
                        grid: {
                            display: false // remove as linhas de fundo
                        },
                        min: 18,
                        max: 38,
                        beginAtZero: false
                    }
                }
            }
        });


        var paginacao = {};
        var tempo = {};

        function obterDados(grafico, endpoint) {
            fetch('http://10.18.32.7:3300/sensores/' + endpoint)
                .then(response => response.json())
                .then(valores => {
                    if (paginacao[endpoint] == null) {
                        paginacao[endpoint] = 0;
                    }
                    if (tempo[endpoint] == null) {
                        tempo[endpoint] = 0;
                    }

                    var ultimaPaginacao = paginacao[endpoint];
                    paginacao[endpoint] = valores.length;
                    valores = valores.slice(ultimaPaginacao);

                    valores.forEach((valor) => {
                        if (grafico.data.labels.length == 10 && grafico.data.datasets[0].data.length == 10) {
                            grafico.data.labels.shift();
                            grafico.data.datasets[0].data.shift();
                        }


                        grafico.data.datasets[0].data.push(parseFloat(valor));
                        cardTemperatura.innerHTML = `${parseFloat(valor)} ºC`
                        if(valor > 25 &&valor<31){
                            statusCard.innerHTML ='Seguro'
                        }else{
                            statusCard.innerHTML ='Risco'

                        }
                        let date = new Date()
                        grafico.data.labels.push(date.toLocaleTimeString());

                        grafico.update();
                    });
                    if (grafico.data.datasets[0].data.length > 10) {
                        grafico.data.datasets[0].data = grafico.data.datasets[0].data.slice(-10)
                    }
                })
                .catch(error => console.error('Erro ao obter dados:', error));
        }

        setInterval(() => {
            obterDados(sensorAnalogico, 'analogico');
            maximo.push(33)
            amarelo1.push(25)
            amarelo2.push(30)
            minimo.push(23)

            if (minimo.length > 10) {
                maximo = maximo.slice(-10)
                amarelo1  =amarelo1.slice(-10)                  
                amarelo2=amarelo2.slice(-10)
                minimo= minimo.slice(-10)
            }

            console.log()
        }, 1000);


    </script>

</html>
